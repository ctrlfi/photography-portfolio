<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedro Gerez | Photography</title>
  <meta name="description" content="Ethereal Glass Photography Portfolio">

  <!-- Fonts: Playfair Display for headers, Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">

  <!-- Spline 3D Viewer -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.51/build/spline-viewer.js"></script>

  <link rel="stylesheet" href="styles.css?v=3">
</head>

<body>
  <!-- Advanced Cursor -->
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <!-- Ambient Background Gradients -->
  <div class="ambient-bg">
    <div class="gradient-sphere sphere-1"></div>
    <div class="gradient-sphere sphere-2"></div>
    <div class="gradient-sphere sphere-3"></div>
  </div>

  <!-- Glassmorphism Navigation -->
  <nav class="glass-nav">
    <div class="logo">CTRL Visuals</div>
    <ul class="nav-links">
      <li><a href="#home" class="magnetic">Home</a></li>
      <li><a href="#gallery" class="magnetic">Selected Works</a></li>
      <li><a href="#contact" class="magnetic">Contact</a></li>
    </ul>
  </nav>

  <!-- Spline Canvas Backdrop -->
  <!-- Positioned absolutely behind the rest of the flow -->
  <spline-viewer id="spline-bg" url="https://prod.spline.design/6Wq1Q7YGyM-iab9i/scene.splinecode"></spline-viewer>

  <main>
    <!-- Hero Section -->
    <section id="home" class="hero">
      <div class="hero-content">
        <h1 class="ethereal-text">Capturing<br><span>The Unseen</span></h1>
        <p class="subtitle">A visual exploration of light, shadow, and architecture.</p>
        <a href="#gallery" class="btn-primary magnetic">Explore Portfolio</a>
      </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="gallery-section">
      <h2 class="section-title">Selected Works</h2>
      <div class="masonry-grid" id="masonry-grid">
        <!-- Javascript will populate this grid dynamically -->
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact-section">
      <div class="glass-panel contact-panel">
        <h2>Let's Create</h2>
        <p>Available for freelance opportunities globally.</p>
        <form class="contact-form">
          <div class="input-group">
            <input type="text" id="name" required placeholder=" ">
            <label for="name">Your Name</label>
          </div>
          <div class="input-group">
            <input type="email" id="email" required placeholder=" ">
            <label for="email">Email Address</label>
          </div>
          <div class="input-group">
            <textarea id="message" required placeholder=" " rows="4"></textarea>
            <label for="message">Project Details</label>
          </div>
          <button type="submit" class="btn-primary magnetic">Send Inquiry</button>
        </form>
      </div>
    </section>
  </main>

  <!-- Lightbox Overlay -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close magnetic"><span></span><span></span></div>
    <img src="" alt="Expanded View" class="lightbox-img">
    <div class="lightbox-caption"></div>
  </div>

  <!-- Main JavaScript -->
  <script type="module" src="app.js?v=3"></script>
</body>

</html>
